name: Update Daily Greeting

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update greeting in README
        run: |
          GREETINGS=(
            "Hi"
            "Hello"
            "Hey"
            "Hola"
            "Bonjour"
            "Ciao"
            "Namaste"
            "Hej"
            "Aloha"
            "Salut"
            "Howdy"
            "Yo"
            "Konnichiwa"
            "Merhaba"
            "Jambo"
            "Ahoy"
            "G'day"
            "Salam"
            "Olá"
          )

          # Pick a random greeting
          RANDOM_INDEX=$((RANDOM % ${#GREETINGS[@]}))
          GREETING="${GREETINGS[$RANDOM_INDEX]}"

          # Replace the greeting line in README.md
          sed -i "s/^# .* 👋, I'm Jinef/# ${GREETING} 👋, I'm Jinef/" README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update daily greeting"
          git push
