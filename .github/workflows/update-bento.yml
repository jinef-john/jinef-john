name: Daily OP-Bento Image Update

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-bento:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch bento image
        run: |
          BENTO_URL="https://opbento.vercel.app/api/bento?n=Jinef&i=https%3A%2F%2Favatars.githubusercontent.com%2Fu%2F137093087&g=jinef-john&x=jinefjohn&l=&p=https%3A%2F%2Fjinef.netlify.app%2F&z=7708f"
          curl -sfL --max-time 60 -o /tmp/bento.bin "$BENTO_URL" || true
          if file /tmp/bento.bin 2>/dev/null | grep -q "PNG image"; then
            echo "Got PNG directly."
            cp /tmp/bento.bin Images/opbento.png
          else
            IMAGE_URL=$(python3 -c "import json,sys;d=json.load(sys.stdin);print(d.get('url',''))" < /tmp/bento.bin 2>/dev/null || true)
            if [ -n "$IMAGE_URL" ]; then
              curl -sfL --max-time 60 -o /tmp/bento_img.bin "$IMAGE_URL" || true
              if file /tmp/bento_img.bin 2>/dev/null | grep -q "PNG image"; then
                echo "Got PNG from URL."
                cp /tmp/bento_img.bin Images/opbento.png
              fi
            else
              echo "Bento API unavailable: $(head -c 80 /tmp/bento.bin 2>/dev/null)"
            fi
          fi

      - name: Update daily stats
        run: |
          STATS=$(curl -sfL --max-time 15 "https://opbento.vercel.app/api/stats?username=jinef-john" || echo '{}')
          STREAK=$(curl -sfL --max-time 15 "https://opbento.vercel.app/api/streak?username=jinef-john" || echo '{}')
          printf '{"updated":"%s","stats":%s,"streak":%s}\n' "$(date +%Y-%m-%d)" "$STATS" "$STREAK" > stats.json
          echo "Stats updated for $(date +%Y-%m-%d)"

      - name: Commit and push
        run: |
          git config user.name "jinef-john"
          git config user.email "80605992+jinef-john@users.noreply.github.com"
          git add Images/opbento.png stats.json
          git diff --staged --quiet || git commit -m "chore: daily update $(date +%Y-%m-%d)"
          git push
